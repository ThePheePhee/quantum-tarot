<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quantum Tarot</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="mast">
        <div>
          <p class="kicker">Quantum-seeded local oracle</p>
          <h1>Three Card Spread</h1>
        </div>
        <svg class="sigil" viewBox="0 0 200 200" aria-hidden="true">
          <defs>
            <radialGradient id="sigilGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#f4ecd8" stop-opacity="0.34"></stop>
              <stop offset="44%" stop-color="#caa45a" stop-opacity="0.16"></stop>
              <stop offset="100%" stop-color="#030303" stop-opacity="0"></stop>
            </radialGradient>
          </defs>
          <circle class="sigil-aura" cx="100" cy="100" r="92"></circle>
          <circle class="sigil-glow" cx="100" cy="100" r="70"></circle>
          <path class="hexagram" d="M100 16 L154 140 L34 62 L166 62 L46 140 L100 184 Z"></path>
          <ellipse class="orbit orbit-one" cx="100" cy="100" rx="70" ry="22"></ellipse>
          <ellipse class="orbit orbit-two" cx="100" cy="100" rx="70" ry="22"></ellipse>
          <ellipse class="orbit orbit-three" cx="100" cy="100" rx="70" ry="22"></ellipse>
          <circle class="quantum-core" cx="100" cy="100" r="7"></circle>
          <circle class="quantum-node node-one" cx="166" cy="94" r="3.5"></circle>
          <circle class="quantum-node node-two" cx="62" cy="119" r="3.5"></circle>
          <circle class="quantum-node node-three" cx="111" cy="50" r="3.5"></circle>
        </svg>
      </section>

      <section class="controls" aria-label="Reading controls">
        <button class="primary" id="drawButton" type="button" disabled>Draw three cards</button>
        <button class="secondary" id="reseedButton" type="button">Reseed quantum randomness</button>
        <p class="status" id="statusText">Awaiting quantum seed.</p>
      </section>

      <section class="spread" id="spread" aria-live="polite">
        <article class="card-slot">
          <div class="card-back"><span>Past</span></div>
        </article>
        <article class="card-slot">
          <div class="card-back"><span>Present</span></div>
        </article>
        <article class="card-slot">
          <div class="card-back"><span>Future</span></div>
        </article>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
