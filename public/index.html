<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quantum Tarot</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="mast">
        <div>
          <p class="kicker">Quantum-seeded local oracle</p>
          <h1>Three Card Spread</h1>
        </div>
        <div class="sigil" aria-hidden="true">
          <span></span>
        </div>
      </section>

      <section class="controls" aria-label="Reading controls">
        <button class="primary" id="drawButton" type="button" disabled>Draw three cards</button>
        <button class="secondary" id="reseedButton" type="button">Reseed quantum randomness</button>
        <p class="status" id="statusText">Awaiting quantum seed.</p>
      </section>

      <section class="spread" id="spread" aria-live="polite">
        <article class="card-slot">
          <div class="card-back"><span>Past</span></div>
        </article>
        <article class="card-slot">
          <div class="card-back"><span>Present</span></div>
        </article>
        <article class="card-slot">
          <div class="card-back"><span>Future</span></div>
        </article>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
